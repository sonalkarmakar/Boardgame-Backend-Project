---
- name: Install Docker on Ubuntu servers
  hosts: servers
  become: true
  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags:
        - pretask1
        - cache_update

    - name: Install required dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      tags:
        - pretask2
        - dependency

  tasks:
    - name: Add Docker repository with GPG key
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
        suites: ["{{ ansible_facts['distribution_release'] }}"]
        components: [stable]
        signed_by: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true
      tags:
        - task3
        - installer

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      tags:
        - task4
        - service

    - name: Add Ansible user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      tags:
        - task5
        - group

    - name: Flush handlers to restart Docker if needed
      ansible.builtin.meta: flush_handlers
      tags:
        - task6
        - cleanup

    - name: Reset Ansible SSH connection for docker group membership
      ansible.builtin.meta: reset_connection
      tags:
        - task7
        - connection_reset