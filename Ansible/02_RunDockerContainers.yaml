---
- name: Deploy Jenkins container
  hosts: jenkins
  become: true
  vars:
    jenkins_image: jenkins/jenkins:slim
  tasks:
    - name: Run Jenkins container
      docker_container:
        name: jenkins_container
        image: "{{ jenkins_image }}"
        ports:
          - "8080:8080"
        volumes:
          - jenkins_home:/var/jenkins_home
        state: started
        restart_policy: unless-stopped

- name: Deploy Nexus container
  hosts: nexus
  become: true
  vars:
    nexus_image: sonatype/nexus3:3.89.1-alpine
  tasks:
    - name: Run Nexus container
      docker_container:
        name: nexus_container
        image: "{{ nexus_image }}"
        ports:
          - "8081:8081"
          - "5000:5000"
        volumes:
          - nexus_data:/nexus-data
        state: started
        restart_policy: unless-stopped

- name: Deploy SonarQube container
  hosts: sonarqube
  become: true
  vars:
    sonarqube_image: sonarqube:community
  tasks:
    - name: Run SonarQube container
      docker_container:
        name: sonarqube_container
        image: "{{ sonarqube_image }}"
        ports:
          - "9000:9000"
        volumes:
          - sonarqube_data:/opt/sonarqube/data
          - sonarqube_extensions:/opt/sonarqube/extensions
          - sonarqube_logs:/opt/sonarqube/logs
        state: started
        restart_policy: unless-stopped