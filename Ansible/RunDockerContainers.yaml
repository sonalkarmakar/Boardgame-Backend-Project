---
- name: Deploy Jenkins container
  hosts: jenkins
  become: true
  tasks:
    - name: Run Jenkins container
      docker_container:
        name: jenkins_container
        image: jenkins/jenkins:slim
        ports:
          - "8080:8080"
        volumes:
          - jenkins_home:/var/jenkins_home
        state: started
        restart_policy: unless-stopped

    - name: Get initial Jenkins admin password
      shell: docker exec jenkins_container cat /var/jenkins_home/secrets/initialAdminPassword
      register: jenkins_password
      changed_when: false

    - name: Display Jenkins initial password
      debug:
        msg: "Jenkins initial admin password: {{ jenkins_password.stdout }}"
      when: jenkins_password.stdout is defined

- name: Deploy Nexus container
  hosts: nexus
  become: true
  tasks:
    - name: Run Nexus container
      docker_container:
        name: nexus_container
        image: sonatype/nexus3:3.89.1-alpine
        ports:
          - "8081:8081"
          - "5000:5000"
        volumes:
          - nexus_data:/nexus-data
        state: started
        restart_policy: unless-stopped

    - name: Retrieve Nexus admin password
      slurp:
        src: /nexus-data/admin.password
      register: admin_password

    - name: Extract and display password
      set_fact:
        nexus_password: "{{ (admin_password.content | b64decode | trim) }}"
      no_log: true

- name: Deploy SonarQube container
  hosts: sonarqube
  become: true
  tasks:
    - name: Run SonarQube container
      docker_container:
        name: sonarqube_container
        image: sonarqube:community
        ports:
          - "9000:9000"
        volumes:
          - sonarqube_data:/opt/sonarqube/data
          - sonarqube_extensions:/opt/sonarqube/extensions
          - sonarqube_logs:/opt/sonarqube/logs
        state: started
        restart_policy: unless-stopped